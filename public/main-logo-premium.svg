<svg width="500" height="200" viewBox="0 0 500 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ultra-Premium Metallic Gold Gradient -->
    <linearGradient id="premiumGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="20%" stop-color="#FDF5D6" />
      <stop offset="40%" stop-color="#B38728" />
      <stop offset="60%" stop-color="#FDF5D6" />
      <stop offset="80%" stop-color="#9E7227" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>

    <!-- Gold Stroke/Border Gradient -->
    <linearGradient id="premiumGoldStroke" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9E7227" />
      <stop offset="50%" stop-color="#FDF5D6" />
      <stop offset="100%" stop-color="#C5A059" />
    </linearGradient>

    <!-- Soft Drop Shadow for luxury relief depth -->
    <filter id="premiumDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Large SEM in Gold Serif with premium gradient and shadow -->
  <text x="50%" y="138" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif" font-size="130" font-weight="700" fill="url(#premiumGold)" stroke="url(#premiumGoldStroke)" stroke-width="0.75" letter-spacing="0.06em" filter="url(#premiumDropShadow)">SEM</text>
  
  <!-- Vertical Thin Line cutting through Center of SEM -->
  <line x1="250" y1="20" x2="250" y2="180" stroke="url(#premiumGoldStroke)" stroke-width="1.5" filter="url(#premiumDropShadow)" />
  
  <!-- SAUDI EVENT MANAGEMENT text across it with shadow for legibility -->
  <text x="50%" y="112" text-anchor="middle" font-family="'Montserrat', 'Inter', 'Helvetica Neue', sans-serif" font-size="12.5" font-weight="900" fill="url(#premiumGold)" stroke="url(#premiumGoldStroke)" stroke-width="0.25" letter-spacing="0.48em" style="text-transform: uppercase;" filter="url(#premiumDropShadow)">SAUDI EVENT MANAGEMENT</text>
</svg>
