
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }

  .version-dark {
    background: #0D0D0D;

  .divider-line-light { width: 100%; height: 0.5px; background: #8B6914; opacity: 0.4; margin: 6px 0; }
  .divider-line-gold { width: 100%; height: 0.5px; background: #0D0D0D; opacity: 0.3; margin: 6px 0; }
